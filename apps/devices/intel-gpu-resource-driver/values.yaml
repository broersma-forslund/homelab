intel-gpu-resource-driver-chart:

  tolerations: []

  cdi:
    staticPath: /run/cdi

  nodeFeatureRules:
    enabled: true
  kubeletPlugin:
    privileged: true
    healthMonitoring:
      enabled: false

xpumd:
  image:
    repository: ghcr.io/intel/xpumanager/xpumd
    tag: v2.0.1
  gpuAccess: dra
  nodeSelector:
    intel.feature.node.kubernetes.io/gpu: "true"
  prometheus:
    monitor: true
  grafana:
    dashboards: true
    namespace: ~
  tolerations: []
