{{- if .Values.route.enabled -}}
apiVersion: {{ .Values.route.apiVersion | default "gateway.networking.k8s.io/v1" }}
kind: {{ .Values.route.kind | default "HTTPRoute" }}
metadata:
  name: dependency-track
spec:
  {{- with .Values.route.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.route.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    # HTTPRoute rules are evaluated in order; keep /api before / to avoid shadowing API traffic.
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ tpl (.Values.route.apiBackendServiceName | default (printf "%s-apiserver" .Release.Name)) $ }}
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ tpl (.Values.route.frontendBackendServiceName | default (printf "%s-frontend" .Release.Name)) $ }}
          port: 80
{{- end }}
