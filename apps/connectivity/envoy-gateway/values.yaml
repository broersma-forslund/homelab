gateway-helm:
  deployment:
    envoyGateway:
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
    replicas: 2

  config:
    envoyGateway:
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace
      logging:
        level:
          default: info # debug/info/error/warn
        # -- For envoy-ai-gateway -- #
        extensionApis:
          # Required: Enable Backend API for AI service backends.
          enableBackend: true
        # Required: AI Gateway needs to fine-tune xDS resources generated by Envoy Gateway.
        extensionManager:
          hooks:
            xdsTranslator:
              translation:
                listener:
                  includeAll: true
                route:
                  includeAll: true
                cluster:
                  includeAll: true
                secret:
                  includeAll: true
              post:
                - Translation
                - Cluster
                - Route
          service:
            fqdn:
              # IMPORTANT: AI Gateway extensions controller
              hostname: ai-gateway-controller.envoy-ai-gateway
              port: 1063
          # backendResources:
          # - group: inference.networking.k8s.io
          #   kind: InferencePool
          #   version: v1
          # -- For envoy-ai-gateway -- #
certificates:
  - name: wildcard-mobrockers-com
    dnsNames:
      - 'mobrockers.com'
      - '*.mobrockers.com'
  - name: wildcard-s3-mobrockers-com
    dnsNames:
      - 's3.mobrockers.com'
      - '*.s3.mobrockers.com'

privateGateway:
  enabled: true
  loadBalancerIP: 10.0.103.21

publicGateway:
  enabled: true
  loadBalancerIP: 10.0.103.22
  publicIP: 87.212.115.7
