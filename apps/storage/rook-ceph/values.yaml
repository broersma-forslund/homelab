rook-ceph:

  scaleDownOperator: false
  revisionHistoryLimit: '0'
  resources:
    requests:
      cpu: 1
      memory: 128Mi
    limits:
      memory: 1Gi
  monitoring:
    enabled: true

  csi:
    serviceMonitor:
      enabled: true

ceph-csi-drivers:

  operatorConfig:
    namespace: rook-ceph
    driverSpecDefaults:
      imageSet:
        # ConfigMap with CSI image overrides, generated by the rook-ceph operator chart.
        name: rook-csi-operator-image-set-configmap
      nodePlugin:
        priorityClassName: system-node-critical
      controllerPlugin:
        priorityClassName: system-cluster-critical

  drivers:
    nfs:
      enabled: false
      name: rook-ceph.nfs.csi.ceph.com

    nvmeof:
      enabled: false
      name: rook-ceph.nvmeof.csi.ceph.com

    rbd:
      enabled: true
      name: rook-ceph.rbd.csi.ceph.com
      snapshotPolicy: volumeGroupSnapshot
      nodePlugin:
        resources:
          registrar:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi
          plugin:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 200Mi
          liveness:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          logRotator:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              memory: 100Mi
          # Unused: the csi-addons sidecar is not deployed (deployCsiAddons: false).
          # Values are set only because the v1.0.1 chart template emits every
          # container key and rejects unset ones (renders `null`), which the Driver
          # CRD refuses. https://github.com/ceph/ceph-csi-operator/issues/490
          addons:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi
      controllerPlugin:
        replicas: 2
        resources:
          provisioner:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          resizer:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          attacher:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          snapshotter:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          plugin:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
          omapGenerator:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          liveness:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          logRotator:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              memory: 100Mi
          # Unused: csi-addons sidecar is not deployed (deployCsiAddons: false).
          # Set only to satisfy the v1.0.1 chart bug (issue #490).
          addons:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi

    cephfs:
      enabled: true
      name: rook-ceph.cephfs.csi.ceph.com
      snapshotPolicy: volumeGroupSnapshot
      nodePlugin:
        resources:
          plugin:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 200Mi
          registrar:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              memory: 100Mi
          liveness:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          logRotator:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              memory: 100Mi
          # Unused: csi-addons sidecar is not deployed (deployCsiAddons: false).
          # Set only to satisfy the v1.0.1 chart bug (issue #490).
          addons:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi
      controllerPlugin:
        replicas: 2
        resources:
          plugin:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          provisioner:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          resizer:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          attacher:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          snapshotter:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          liveness:
            requests:
              cpu: 50m
              memory: 50Mi
            limits:
              memory: 100Mi
          logRotator:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              memory: 100Mi
          # Unused: csi-addons sidecar is not deployed (deployCsiAddons: false).
          # Set only to satisfy the v1.0.1 chart bug (issue #490).
          addons:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi
          # Unused: CephFS has no omapGenerator sidecar, but the v1.0.1 chart
          # template still emits the key (issue #490).
          omapGenerator:
            requests:
              cpu: 10m
              memory: 30Mi
            limits:
              memory: 100Mi
