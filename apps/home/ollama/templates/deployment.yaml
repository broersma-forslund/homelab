apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: ollama
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: ollama
        app.kubernetes.io/name: ollama
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ . | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ . | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ . | toYaml | nindent 8 }}
      {{- end }}
      containers:
      - name: ollama
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
        # The IPEX-LLM image ships an Intel-GPU accelerated Ollama runtime. `init-ollama`
        # links the bundled binary into the working directory; we then start the server
        # and pull the configured model (no-op once it is already on the PVC).
        command:
        - /bin/bash
        - -c
        - |
          set -e
          mkdir -p /llm/ollama
          cd /llm/ollama
          init-ollama
          export OLLAMA_HOST=0.0.0.0:11434
          export OLLAMA_MODELS=/root/.ollama/models
          export ZES_ENABLE_SYSMAN=1
          export SYCL_CACHE_PERSISTENT=1
          export OLLAMA_NUM_GPU=999
          export OLLAMA_KEEP_ALIVE=-1
          ./ollama serve &
          serve_pid=$!
          until OLLAMA_HOST=127.0.0.1:11434 ./ollama list >/dev/null 2>&1; do
            sleep 2
          done
          OLLAMA_HOST=127.0.0.1:11434 ./ollama pull {{ .Values.model }} || true
          wait "$serve_pid"
        ports:
        - name: http
          containerPort: 11434
        env:
        - name: TZ
          value: Europe/Amsterdam
        resources:
          requests:
            cpu: 500m
            memory: 4Gi
          limits:
            memory: 16Gi
          claims:
          - name: i915
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      resourceClaims:
      - name: i915
        resourceClaimTemplateName: ollama-i915
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models
