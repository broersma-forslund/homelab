home-assistant:

  podSecurityContext:
    fsGroup: 5000

  securityContext:
    runAsGroup: 5000
    capabilities: {}

  persistence:
    size: 10Gi

  route:
    enabled: true
    hostnames:
      - home.mobrockers.com
    parentRefs:
      - name: private
        namespace: envoy-gateway
        sectionName: web-https
      - name: public
        namespace: envoy-gateway
        sectionName: web-https
  ingress:
    enabled: false

  config:
    securityContext:
      runAsGroup: 5000

  additionalVolumes:
  - name: mqtts-proxy-config
    configMap:
      name: mqtts-proxy-config
  - name: svc-cluster-local-bundle
    configMap:
      name: svc-cluster-local-bundle
  additionalInitContainers:
  - name: mqtts-proxy
    image: cgr.dev/chainguard/stunnel:latest@sha256:2fc3812959e47010e14d5fbae437dabe9da9ac2ce18552d075a80195263ac3fa
    restartPolicy: Always
    command: ["stunnel", "/etc/conf/stunnel.conf"]
    volumeMounts:
    - name: mqtts-proxy-config
      mountPath: /etc/conf/
    - name: svc-cluster-local-bundle
      mountPath: /ca
      readOnly: true
    # resources:
    #   requests:
    #     cpu: 10m
    #     memory: 16Mi
    #   limits:
    #     memory: 64Mi

matterHub:
  image:
    repository: ghcr.io/t0bst4r/home-assistant-matter-hub
    tag: 3.0.0-alpha.87

  route:
    enabled: true
    hostnames:
    - matter-hub.mobrockers.com
    parentRefs:
    - name: private
      namespace: envoy-gateway
      sectionName: web-https

# Local voice assistant pipeline.
# Wyoming Whisper (speech-to-text) and Piper (text-to-speech) expose the Wyoming
# protocol so Home Assistant Assist (and future ESPHome/Wyoming voice satellites)
# can use them, while Ollama provides a local LLM conversation agent on the Intel
# iGPU. See VOICE_ASSISTANT.md for the Home Assistant side configuration.
voice:
  # Wyoming speech-to-text. The faster-whisper model is multilingual, so a single
  # instance serves English plus the optional Dutch (nl) and Swedish (sv) commands.
  whisper:
    image:
      repository: ghcr.io/linuxserver/faster-whisper
      tag: "3.2.0"
    # Larger models are more accurate but slower; "small" is a good CPU default.
    model: small
    # "auto" lets Home Assistant pass the pipeline language (en/nl/sv) per request.
    language: auto
    beamSize: 1
    persistence:
      size: 5Gi
  # Wyoming text-to-speech. Additional voices (male/female, nl, sv) are downloaded
  # on demand into the config volume when selected in the Home Assistant pipeline.
  piper:
    image:
      repository: ghcr.io/linuxserver/piper
      tag: "2.2.2"
    voice: en_US-lessac-medium
    persistence:
      size: 2Gi
  # Local LLM runtime. The IPEX-LLM image runs Ollama on the 13th gen Intel iGPU.
  ollama:
    image:
      repository: intelanalytics/ipex-llm-inference-cpp-xpu
      tag: "2.3.0-SNAPSHOT"
    # Qwen3 8B per the requirements; switch to a smaller model (e.g. qwen3:4b)
    # if responses are too slow on the iGPU.
    model: qwen3:8b
    persistence:
      size: 30Gi
