# Wyoming speech-to-text (faster-whisper) for the Home Assistant voice assistant.
image:
  repository: ghcr.io/linuxserver/faster-whisper
  tag: "3.2.0"

# faster-whisper is multilingual, so a single instance serves English plus the
# optional Dutch (nl) and Swedish (sv) commands. Larger models are more accurate
# but slower; "small" is a good CPU default.
model: small
# "auto" lets Home Assistant pass the pipeline language (en/nl/sv) per request.
language: auto
beamSize: 1

persistence:
  size: 5Gi
