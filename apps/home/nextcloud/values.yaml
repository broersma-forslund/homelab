nextcloud:
  replicaCount: 1

  image:
    flavor: fpm

  phpClientHttpsFix:
    enabled: true
    protocol: https

  nginx:
    enabled: true

  httpRoute:
    enabled: true
    hostnames:
    - nextcloud.mobrockers.com
    parentRefs:
      - name: private
        namespace: envoy-gateway
        sectionName: web-https
      # - name: public
      #   namespace: envoy-gateway
      #   sectionName: web-https
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      timeout: 600s

  nextcloud:
    host: nextcloud.mobrockers.com

    objectStore:
      s3:
        enabled: true
        host: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc
        port: 80
        ssl: false
        bucket: nextcloud-5f950fc9-2b5f-4984-993e-e8ab1c3a8250
        usePathStyle: true
        existingSecret: nextcloud-bucket
        secretKeys:
          accessKey: AWS_ACCESS_KEY_ID
          secretKey: AWS_SECRET_ACCESS_KEY

    existingSecret:
      enabled: true
      secretName: nextcloud-credentials
      usernameKey: username
      passwordKey: password

    mail:
      enabled: false

    # resources:
    #   limits:
    #     memory: 256Mi
    #   requests:
    #     cpu: 100m
    #     memory: 128Mi

  internalDatabase:
    enabled: false
  externalDatabase:
    enabled: true
    type: postgresql
    existingSecret:
      enabled: true
      secretName: nextcloud-db-app
      hostKey: host
      databaseKey: dbname
      usernameKey: username
      passwordKey: password

  cronjob:
    enabled: true
    type: cronjob
    cronjob:
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 1
      securityContext:
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 33

  persistence:
    enabled: true
    storageClass: ceph-filesystem
    accessMode: ReadWriteMany
    size: 8Gi

  # resources:
  #   limits:
  #     memory: 512Mi
  #   requests:
  #     cpu: 90m
  #     memory: 128Mi

  prometheus:
    enabled: true
    info:
      apps: true
    serviceMonitor:
      enabled: true

  startupProbe:
    enabled: true