 node-problem-detector:

  tolerations:
  - key: node.cilium.io/agent-not-ready
    operator: Exists
  - key: node.kubernetes.io/unreachable
    operator: Exists

  resources: { }

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
    prometheusRule:
      enabled: true
      defaultRules:
        create: true
