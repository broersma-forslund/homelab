gateway-helm:
  crds:
    enabled: false
  deployment:
    envoyGateway:
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
    replicas: 2

  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/ai-gateway-controller
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: ProviderNamespace # GatewayNamespace # Until https://github.com/envoyproxy/ai-gateway/pull/2304 is fixed
      extensionApis:
        # Not strictly required, but recommended for backward/future compatibility.
        enableEnvoyPatchPolicy: true
        # Required: Enable Backend API for AI service backends.
        enableBackend: true
      # Required: AI Gateway needs to fine-tune xDS resources generated by Envoy Gateway.
      extensionManager:
        hooks:
          xdsTranslator:
            translation:
              listener:
                includeAll: true
              route:
                includeAll: true
              cluster:
                includeAll: true
              secret:
                includeAll: true
            post:
              - Translation
              - Cluster
              - Route
        service:
          fqdn:
            # IMPORTANT: AI Gateway extensions controller
            hostname: ai-gateway-controller
            port: 1063
        # backendResources:
        # - group: inference.networking.k8s.io
        #   kind: InferencePool
        #   version: v1

ai-gateway-helm:
  controller:
    quotaRateLimitServiceAddr: envoy-ai-gateway-ratelimit
  mutatingWebhook:
    certManager:
      enable: true
  envoyGateway:
    namespace : envoy-ai-gateway
