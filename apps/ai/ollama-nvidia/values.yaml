ollama:

  tolerations:
    - key: node-role.kubernetes.io/gpu
      operator: Exists
  extraEnv:
  # Tell Ollama to offload all layers to GPU (999 = "as many as possible")
  - name: OLLAMA_NUM_GPU
    value: "999"
  # Keep the model loaded in GPU memory indefinitely (-1 = never unload)
  - name: OLLAMA_KEEP_ALIVE
    value: "-1"

  ollama:
    gpu:
      enabled: true
      draEnabled: true
      type: nvidia
      draDriverClass: gpu.nvidia.com
      draExistingClaimTemplate: ollama-nvidia
    # -- List of models to pull at container startup
    models:
      clean: true
      pull:
      - qwen3:8b
      # Placeholder embedding model for Open WebUI RAG; revisit once the dGPU lands
      # (candidates: mxbai-embed-large, bge-m3).
      - nomic-embed-text

  persistentVolume:
    enabled: true
    storageClass: local-nvme
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      memory: 16Gi

  updateStrategy:
    type: Recreate
