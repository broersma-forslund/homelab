{{- $webui := index .Values "open-webui" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-webui-env
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: env
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  ENABLE_PERSISTENT_CONFIG: "false"
  # --- General ---
  # Derived from route.hostnames so it can't drift from the actual HTTPRoute address.
  WEBUI_URL: "https://{{ index $webui.route.hostnames 0 }}"

  # --- Vector DB: pgvector via the VectorChord Postgres image ---
  # Extension is created declaratively by CNPG's Database CR (see
  # templates/database/database.yaml), so the app DB role can stay non-superuser.
  VECTOR_DB: pgvector
  PGVECTOR_CREATE_EXTENSION: "false"

  # --- RAG embeddings: offload to Ollama through envoy-ai-gateway (consistent with chat) ---
  # Base URL derived from openaiBaseApiUrl so both connections always point at the
  # same gateway.
  RAG_EMBEDDING_ENGINE: openai
  RAG_OPENAI_API_BASE_URL: {{ $webui.openaiBaseApiUrl }}
  RAG_EMBEDDING_MODEL: nomic-embed-text
  RAG_EMBEDDING_CONTENT_PREFIX: "search_document: "
  RAG_EMBEDDING_QUERY_PREFIX: "search_query: "

  # --- Offline mode / model-download lockdown ---
  # Safe alongside the above: OFFLINE_MODE only blocks HuggingFace Hub downloads
  # (local sentence-transformers/whisper); OAuth, external LLM APIs, and web
  # search/RAG via external APIs remain functional.
  OFFLINE_MODE: "true"
  HF_HUB_OFFLINE: "1"
  RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
  RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
  WHISPER_MODEL_AUTO_UPDATE: "false"

  # --- Hardening: auth/session (Authentik SSO is the only login path) ---
  ENABLE_LOGIN_FORM: "false"
  ENABLE_PASSWORD_AUTH: "false"
  ENABLE_PASSWORD_CHANGE_FORM: "false"
  WEBUI_SESSION_COOKIE_SECURE: "true"
  # NOTE: docs warn "strict" can break the OAuth callback when ENABLE_OAUTH_SIGNUP
  # is enabled (which it is here, via sso.enableSignup). Requested explicitly -
  # verify login still works after rollout; fall back to "lax" if the OIDC
  # callback fails (session cookie not sent back with the provider's redirect).
  WEBUI_SESSION_COOKIE_SAME_SITE: strict
  ENABLE_OAUTH_BACKCHANNEL_LOGOUT: "true"

  # --- Hardening: network / fetch ---
  CORS_ALLOW_ORIGIN: "https://{{ index $webui.route.hostnames 0 }}"
  USER_AGENT: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

  # --- Hardening: misc data/privacy ---
  ENABLE_PROFILE_IMAGE_URL_FORWARDING: "false"
  ENABLE_PIP_INSTALL_FRONTMATTER_REQUIREMENTS: "false"
  RAG_FILE_MAX_SIZE: "100"
  RAG_FILE_MAX_COUNT: "20"

  # --- Scaling knobs (multi-replica + Redis already in place) ---
  DATABASE_POOL_SIZE: "15"
  DATABASE_POOL_MAX_OVERFLOW: "20"
  THREAD_POOL_SIZE: "2000"
  DATABASE_USER_ACTIVE_STATUS_UPDATE_INTERVAL: "300"
