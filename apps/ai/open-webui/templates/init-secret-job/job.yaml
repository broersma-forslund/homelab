{{- if .Values.initSecretJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init-secret-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: init-secret-job
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: init-secret-job
    spec:
      containers:
        - name: init-secret
          image: "{{ .Values.initSecretJob.image.registry }}/{{ .Values.initSecretJob.image.repository }}:{{ .Values.initSecretJob.image.tag }}"
          imagePullPolicy: {{ .Values.initSecretJob.image.pullPolicy }}
          resources: {{ toYaml .Values.initSecretJob.resources | nindent 12 }}
          command:
            - sh
            - "-c"
            - |
              kubectl get secret {{ .Release.Name }}-secret -n {{ .Release.Namespace }} >/dev/null 2>&1 || \
              kubectl create secret generic {{ .Release.Name }}-secret -n {{ .Release.Namespace }} \
                --from-literal=WEBUI_SECRET_KEY=$(head -c 32 /dev/urandom | base64)
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-init-secret-job
{{- end }}
