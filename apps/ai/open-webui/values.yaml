open-webui:
  replicaCount: 2

  persistence:
    enabled: true
    size: 50Gi
    storageClass: ceph-filesystem
    accessModes:
      - ReadWriteMany

  websocket:
    enabled: true
    manager: redis

  # Apache Tika for improved document/content extraction (RAG uploads).
  tika:
    enabled: true

  # Route chat completions through the local Envoy AI Gateway
  enableOpenaiApi: true
  openaiBaseApiUrl: http://ollama-nvidia.ollama-nvidia.svc.cluster.local/v1
  openaiApiKey: ""

  extraEnvVars:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: open-webui-db-app
          key: uri
    - name: WEBUI_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: open-webui-secret
          key: WEBUI_SECRET_KEY

  extraEnvFrom:
    - configMapRef:
        name: open-webui-env

  sso:
    enabled: true
    enableSignup: true
    enableRoleManagement: true
    roleManagement:
      rolesClaim: groups
      adminRoles: Administrators
      allowedRoles: Administrators,Users
    oidc:
      enabled: true
      providerName: Authentik
      providerUrl: https://authentik.mobrockers.com/application/o/open-webui/.well-known/openid-configuration
      scopes: "openid profile email groups"
      clientId: 2aL6rLRDHx1pN8epxCSVbG2CPvCunBRRxSSpetvz
      clientExistingSecret: open-webui-oidc-credentials
      clientExistingSecretKey: clientSecret

  route:
    enabled: true
    hostnames:
      - chat.mobrockers.com
    parentRefs:
      - name: private
        namespace: envoy-gateway
        sectionName: web-https

  # Disable built-in ollama, open-webui pipelines, and terminals.
  ollama:
    enabled: false
  pipelines:
    enabled: false
  terminals:
    enabled: false

database:
  image:
    registry: ghcr.io
    repository: tensorchord/cloudnative-vectorchord
    tag: "18.4-1.1.1"

# Init Secret Job Configuration
# Generates WEBUI_SECRET_KEY on cluster startup if not present
# Required for multi-replica deployments to share session tokens
initSecretJob:
  enabled: true
  image:
    registry: docker.io
    repository: alpine/kubectl
    tag: 1.36.2
    pullPolicy: IfNotPresent
  resources: {}
