ollama:

  nodeSelector:
    node-role.kubernetes.io/gpu: ""
  tolerations:
    - key: node-role.kubernetes.io/gpu
      operator: Exists
  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: "2.3.0-SNAPSHOT"

  # The IPEX-LLM image has no entrypoint; args run the startup script staged by
  # the init container.
  extraArgs:
  - /bin/bash
  - /scripts/start-ollama.sh

  extraEnv:
  - name: TZ
    value: Europe/Amsterdam
  # Required for Intel Level Zero / GPU management via oneAPI System Resource Management
  - name: ZES_ENABLE_SYSMAN
    value: "1"
  # Cache compiled SYCL kernels across restarts to avoid recompilation overhead
  - name: SYCL_CACHE_PERSISTENT
    value: "1"
  # Tell Ollama to offload all layers to GPU (999 = "as many as possible")
  - name: OLLAMA_NUM_GPU
    value: "999"
  # Keep the model loaded in GPU memory indefinitely (-1 = never unload)
  - name: OLLAMA_KEEP_ALIVE
    value: "-1"

  ollama:
    gpu:
      enabled: true
      draEnabled: true
      # gpu.type must be non-nvidia to suppress the automatic nvidia.com/gpu toleration.
      type: intel
      draDriverClass: gpu.intel.com
      draExistingClaimTemplate: ollama-i915
    # -- List of models to pull at container startup
    models:
      clean: true
      pull:
      - nomic-embed-text
      run:
      - nomic-embed-text

  persistentVolume:
    enabled: true
    storageClass: local-nvme
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      memory: 16Gi

  # Stage the startup script from the ConfigMap onto a shared emptyDir so the main
  # container can exec it (the ConfigMap volume is read-only and non-executable).
  initContainers:
  - name: init-script
    image: busybox:1.38
    command:
    - sh
    - -c
    - cp /config/start-ollama.sh /scripts/start-ollama.sh && chmod +x /scripts/start-ollama.sh
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    - name: startup-script
      mountPath: /config

  volumes:
  - name: scripts
    emptyDir: {}
  - name: startup-script
    configMap:
      name: ollama-startup-script

  volumeMounts:
  - name: scripts
    mountPath: /scripts

  updateStrategy:
    type: Recreate
